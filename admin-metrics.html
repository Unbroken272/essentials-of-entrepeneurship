<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smoke Test Dashboard - SwapNest</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --green-500: #22c55e;
      --green-600: #16a34a;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-600: #475569;
      --slate-800: #1e293b;
      --radius: 8px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--slate-50);
      color: var(--slate-800);
    }

    .navbar {
      background: white;
      border-bottom: 1px solid var(--slate-200);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar-brand {
      font-weight: 700;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .navbar-brand span {
      color: var(--green-600);
    }

    .container {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      margin: 0 0 8px 0;
      font-size: 1.875rem;
    }

    .header p {
      margin: 0;
      color: var(--slate-600);
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .card {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--slate-100);
    }

    .kpi-title {
      font-size: 0.875rem;
      color: var(--slate-600);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--slate-800);
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .chart-container {
      position: relative;
      height: 300px;
    }

    details {
      background: white;
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--slate-200);
    }

    summary {
      font-weight: 600;
      cursor: pointer;
      color: var(--slate-800);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      text-align: left;
      font-size: 0.875rem;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid var(--slate-100);
    }

    th {
      color: var(--slate-600);
      font-weight: 500;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--slate-200);
      padding: 8px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.875rem;
      color: var(--slate-600);
      float: right;
    }

    .clear-btn:hover {
      background: var(--slate-100);
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="navbar-brand">🌿 <span>SwapNest</span> Admin</div>
  </nav>

  <div class="container">
    <div class="header">
      <button class="clear-btn" onclick="clearMetrics()">Clear Data</button>
      <h1>Smoke Test Dashboard</h1>
      <p>Real-time metrics overview</p>
    </div>

    <div class="kpi-grid">
      <div class="card">
        <div class="kpi-title">Total Visitors</div>
        <div class="kpi-value" id="kpi-visitors">0</div>
      </div>
      <div class="card">
        <div class="kpi-title">Waitlist Signups</div>
        <div class="kpi-value" id="kpi-signups">0</div>
      </div>
      <div class="card">
        <div class="kpi-title">Conversion Rate</div>
        <div class="kpi-value" id="kpi-conversion">0%</div>
      </div>
      <div class="card">
        <div class="kpi-title">Avg. Time on Site</div>
        <div class="kpi-value" id="kpi-time">0s</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="card">
        <h3 style="margin-top:0; font-size:1rem; color:var(--slate-800);">Traffic Sources</h3>
        <div class="chart-container">
          <canvas id="trafficChart"></canvas>
        </div>
      </div>
      <div class="card">
        <h3 style="margin-top:0; font-size:1rem; color:var(--slate-800);">Top Events / Clicks</h3>
        <div class="chart-container">
          <canvas id="eventsChart"></canvas>
        </div>
      </div>
    </div>

    <details>
      <summary>View Raw Data Dump</summary>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>Session ID</th>
              <th>Referrer</th>
              <th>Time Spent</th>
              <th>Waitlist Signups</th>
              <th>Page Views</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="raw-table-body">
          </tbody>
        </table>
      </div>
    </details>
  </div>

  <script src="analytics.js"></script>
  <script>
    function formatTime(ms) {
      if (!ms) return '0s';
      const totalSeconds = Math.round(ms / 1000);
      const m = Math.floor(totalSeconds / 60);
      const s = totalSeconds % 60;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    }

    function renderDashboard() {
      const metrics = (typeof Analytics !== 'undefined') ? Analytics.getMetrics() : [];

      // 1. Calculate KPIs
      const totalVisitors = metrics.length;
      let totalSignups = 0;
      let totalTimeSpent = 0;

      const trafficSources = {};
      const eventsCount = {};

      metrics.forEach(session => {
        // KPIs
        totalSignups += (session.waitlistSignups || 0);
        totalTimeSpent += (session.timeSpentMs || 0);

        // Sources
        const ref = session.referrer && session.referrer.trim() ? session.referrer : "direct";
        trafficSources[ref] = (trafficSources[ref] || 0) + 1;

        // Events
        if (session.clicks) {
          session.clicks.forEach(click => {
            const label = click.label || 'Unknown Click';
            eventsCount[label] = (eventsCount[label] || 0) + 1;
          });
        }
      });

      const conversionRate = totalVisitors > 0 ? ((totalSignups / totalVisitors) * 100).toFixed(1) : 0;
      const avgTimeMs = totalVisitors > 0 ? totalTimeSpent / totalVisitors : 0;

      // Update DOM
      document.getElementById('kpi-visitors').innerText = totalVisitors;
      document.getElementById('kpi-signups').innerText = totalSignups;
      document.getElementById('kpi-conversion').innerText = conversionRate + '%';
      document.getElementById('kpi-time').innerText = formatTime(avgTimeMs);

      // 2. Charts
      renderTrafficChart(trafficSources);
      renderEventsChart(eventsCount);

      // 3. Raw Data
      renderRawTable(metrics);
    }

    let trafficChartInstance = null;
    function renderTrafficChart(dataObj) {
      const ctx = document.getElementById('trafficChart').getContext('2d');
      const labels = Object.keys(dataObj);
      const data = Object.values(dataObj);

      if (trafficChartInstance) trafficChartInstance.destroy();

      trafficChartInstance = new Chart(ctx, {
        type: 'pie',
        data: {
          labels: labels.length ? labels : ['No Data'],
          datasets: [{
            data: data.length ? data : [1],
            backgroundColor: [
              '#22c55e', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#e2e8f0'
            ],
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'right' }
          }
        }
      });
    }

    let eventsChartInstance = null;
    function renderEventsChart(dataObj) {
      const ctx = document.getElementById('eventsChart').getContext('2d');
      // Sort descending
      const sortedEvents = Object.keys(dataObj).map(k => ({ label: k, count: dataObj[k] }))
        .sort((a, b) => b.count - a.count)
        .slice(0, 10); // top 10

      const labels = sortedEvents.map(e => e.label);
      const data = sortedEvents.map(e => e.count);

      if (eventsChartInstance) eventsChartInstance.destroy();

      eventsChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels.length ? labels : ['No Data'],
          datasets: [{
            label: 'Clicks',
            data: data.length ? data : [0],
            backgroundColor: '#22c55e',
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1 } }
          }
        }
      });
    }

    function renderRawTable(metrics) {
      const tbody = document.getElementById('raw-table-body');
      if (!metrics || metrics.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No session data yet.</td></tr>';
        return;
      }

      tbody.innerHTML = metrics.map(session => {
        const timeStr = formatTime(session.timeSpentMs);
        const views = session.pageViews ? session.pageViews.join(', ') : '';
        const clicks = session.clicks ? session.clicks.length + ' clicks' : '0 clicks';

        return `
          <tr>
              <td style="font-family: monospace;" title="${session.id}">${session.id.substring(0, 12)}...</td>
              <td>${session.referrer || 'direct'}</td>
              <td>${timeStr}</td>
              <td><strong>${session.waitlistSignups || 0}</strong></td>
              <td style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${views}">${views}</td>
              <td><span style="color: var(--slate-500);">${clicks}</span></td>
          </tr>
        `;
      }).reverse().join('');
    }

    function clearMetrics() {
      if (confirm("Are you sure you want to clear all analytics data?")) {
        localStorage.removeItem('swapnest_metrics');
        renderDashboard();
      }
    }

    document.addEventListener('DOMContentLoaded', renderDashboard);
  </script>
</body>

</html>
